name: beautiful_ebook_app
description: A beautiful eBook app UI (6+ screens) built with Flutter Material 3.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI / Theme
  dynamic_color: ^1.7.0
  google_fonts: ^6.2.1

  # Navigation
  go_router: ^14.6.0

  # State / persistence
  provider: ^6.1.2
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
